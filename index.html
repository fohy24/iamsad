<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="description" content="A gentle space to check in with yourself" />
  <title>gentle check-in</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f0e17;
      --surface: #1a1830;
      --surface2: #221f3a;
      --accent: #e8c4a0;
      --accent2: #9b8ec4;
      --text: #fffffe;
      --text-muted: #a7a4b8;
      --danger: #e06c75;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
      position: relative;
      overflow-x: hidden;
    }

    /* Subtle ambient background */
    body::before {
      content: '';
      position: fixed;
      top: -30%;
      left: -20%;
      width: 70%;
      height: 70%;
      background: radial-gradient(ellipse, rgba(155, 142, 196, 0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -20%;
      right: -10%;
      width: 60%;
      height: 60%;
      background: radial-gradient(ellipse, rgba(232, 196, 160, 0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 560px;
    }

    header {
      text-align: center;
      margin-bottom: 3.5rem;
      padding-top: 1rem;
    }

    .title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      font-weight: 400;
      letter-spacing: 0.02em;
      color: var(--text);
    }

    .title em {
      color: var(--accent);
      font-style: italic;
    }

    .subtitle {
      margin-top: 0.5rem;
      font-size: 0.72rem;
      color: var(--text-muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* ── BIG SAD BUTTON ── */
    .sad-btn {
      display: block;
      width: 100%;
      padding: 1.4rem 2rem;
      background: transparent;
      border: 1.5px solid rgba(232, 196, 160, 0.3);
      border-radius: var(--radius);
      color: var(--accent);
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-style: italic;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .sad-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(232,196,160,0.06), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .sad-btn:hover {
      border-color: rgba(232, 196, 160, 0.7);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(232, 196, 160, 0.1);
    }
    .sad-btn:hover::before { opacity: 1; }

    .sad-btn:active { transform: translateY(0); }

    /* ── ENTRY FORM ── */
    .entry-form {
      margin-top: 2rem;
      background: var(--surface);
      border: 1px solid rgba(155,142,196,0.15);
      border-radius: var(--radius);
      padding: 1.8rem;
      animation: slideIn 0.4s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .form-label {
      display: block;
      font-size: 0.7rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.8rem;
    }

    .form-label span {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-style: italic;
      letter-spacing: 0;
      text-transform: none;
      display: block;
      color: var(--text);
      margin-top: 0.3rem;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      background: var(--surface2);
      border: 1px solid rgba(155,142,196,0.2);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.88rem;
      line-height: 1.7;
      padding: 1rem;
      resize: vertical;
      transition: border-color 0.2s;
      outline: none;
    }

    textarea:focus {
      border-color: rgba(155,142,196,0.6);
      box-shadow: 0 0 0 3px rgba(155,142,196,0.08);
    }

    textarea::placeholder {
      color: rgba(167,164,184,0.4);
    }

    .form-actions {
      display: flex;
      gap: 0.8rem;
      margin-top: 1.2rem;
    }

    .btn-save {
      flex: 1;
      padding: 0.75rem 1.2rem;
      background: var(--accent2);
      border: none;
      border-radius: 8px;
      color: var(--bg);
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-save:hover {
      background: #b4a8d4;
      transform: translateY(-1px);
    }

    .btn-cancel {
      padding: 0.75rem 1.2rem;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-cancel:hover {
      border-color: rgba(255,255,255,0.25);
      color: var(--text);
    }

    /* ── ENTRIES LIST ── */
    .entries-section {
      margin-top: 3rem;
    }

    .section-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 1.2rem;
      padding-bottom: 0.8rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .section-title {
      font-size: 0.7rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .entry-count {
      font-size: 0.65rem;
      color: var(--accent2);
      letter-spacing: 0.05em;
    }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
      font-size: 0.8rem;
      line-height: 1.9;
    }

    .empty-state .icon {
      font-size: 2rem;
      display: block;
      margin-bottom: 0.8rem;
      opacity: 0.4;
    }

    .entry-card {
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: var(--radius);
      padding: 1.2rem 1.4rem;
      margin-bottom: 0.8rem;
      animation: fadeIn 0.3s ease;
      position: relative;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .entry-card:hover {
      border-color: rgba(155,142,196,0.2);
    }

    .entry-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.7rem;
    }

    .entry-date {
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      color: var(--accent);
      opacity: 0.7;
    }

    .btn-delete {
      background: none;
      border: none;
      color: rgba(224,108,117,0.4);
      cursor: pointer;
      font-size: 0.75rem;
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      transition: color 0.2s;
    }
    .btn-delete:hover { color: var(--danger); }

    .entry-text {
      font-size: 0.85rem;
      line-height: 1.75;
      color: var(--text);
      white-space: pre-wrap;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2);
      border: 1px solid rgba(155,142,196,0.3);
      border-radius: 50px;
      padding: 0.65rem 1.4rem;
      font-size: 0.75rem;
      color: var(--text);
      letter-spacing: 0.05em;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
      z-index: 100;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── INSTALL BANNER ── */
    .install-banner {
      width: 100%;
      max-width: 560px;
      background: var(--surface);
      border: 1px solid rgba(232,196,160,0.15);
      border-radius: var(--radius);
      padding: 1rem 1.4rem;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      font-size: 0.75rem;
      color: var(--text-muted);
      position: relative;
      z-index: 1;
    }

    .install-banner button {
      margin-left: auto;
      background: var(--accent);
      border: none;
      border-radius: 6px;
      color: var(--bg);
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      padding: 0.4rem 0.9rem;
      cursor: pointer;
      white-space: nowrap;
    }

    .close-banner {
      background: none !important;
      color: var(--text-muted) !important;
      padding: 0.2rem !important;
      font-size: 1rem !important;
    }
  </style>
</head>
<body>

  <div id="installBanner" class="install-banner" style="display:none">
    📲 <span>Add to your home screen for easy access</span>
    <button id="installBtn">Install</button>
    <button class="close-banner" id="closeBanner">×</button>
  </div>

  <div class="container">
    <header>
      <h1 class="title">a <em>gentle</em> check-in</h1>
      <p class="subtitle">just for you · private · always here</p>
    </header>

    <button class="sad-btn" id="sadBtn">I'm sad</button>

    <div class="entry-form" id="entryForm" style="display:none">
      <label class="form-label" for="entryText">
        what have you done to feel happier?
        <span>or what's on your mind right now</span>
      </label>
      <textarea id="entryText" placeholder="write as little or as much as you need…"></textarea>
      <div class="form-actions">
        <button class="btn-save" id="saveBtn">save this moment</button>
        <button class="btn-cancel" id="cancelBtn">cancel</button>
      </div>
    </div>

    <section class="entries-section">
      <div class="section-header">
        <span class="section-title">your moments</span>
        <span class="entry-count" id="entryCount"></span>
      </div>
      <div id="entriesList"></div>
    </section>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const STORAGE_KEY = 'gentle_checkin_entries';

    // ── State ──────────────────────────────────────────────
    let entries = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

    // ── Elements ───────────────────────────────────────────
    const sadBtn      = document.getElementById('sadBtn');
    const entryForm   = document.getElementById('entryForm');
    const entryText   = document.getElementById('entryText');
    const saveBtn     = document.getElementById('saveBtn');
    const cancelBtn   = document.getElementById('cancelBtn');
    const entriesList = document.getElementById('entriesList');
    const entryCount  = document.getElementById('entryCount');
    const toast       = document.getElementById('toast');

    // ── Helpers ────────────────────────────────────────────
    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
    }

    function formatDate(iso) {
      const d = new Date(iso);
      return d.toLocaleDateString('en-GB', {
        weekday: 'short', year: 'numeric',
        month: 'short', day: 'numeric'
      }) + ' · ' + d.toLocaleTimeString('en-GB', {
        hour: '2-digit', minute: '2-digit'
      });
    }

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // ── Render ─────────────────────────────────────────────
    function render() {
      const count = entries.length;
      entryCount.textContent = count ? `${count} entry${count !== 1 ? 'ies' : 'y'}` : '';

      if (!count) {
        entriesList.innerHTML = `
          <div class="empty-state">
            <span class="icon">🌙</span>
            your entries will appear here.<br>
            they're stored only on this device.
          </div>`;
        return;
      }

      // Newest first
      const sorted = [...entries].sort((a, b) => new Date(b.date) - new Date(a.date));
      entriesList.innerHTML = sorted.map(e => `
        <div class="entry-card" data-id="${e.id}">
          <div class="entry-meta">
            <span class="entry-date">${formatDate(e.date)}</span>
            <button class="btn-delete" data-id="${e.id}" title="delete">✕</button>
          </div>
          <p class="entry-text">${escapeHtml(e.text)}</p>
        </div>
      `).join('');
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── Events ─────────────────────────────────────────────
    sadBtn.addEventListener('click', () => {
      entryForm.style.display = 'block';
      entryText.focus();
      sadBtn.style.display = 'none';
    });

    cancelBtn.addEventListener('click', () => {
      entryForm.style.display = 'none';
      sadBtn.style.display = 'block';
      entryText.value = '';
    });

    saveBtn.addEventListener('click', () => {
      const text = entryText.value.trim();
      if (!text) { showToast('write something first 💙'); return; }

      entries.push({
        id: Date.now().toString(),
        date: new Date().toISOString(),
        text
      });
      save();
      render();

      entryForm.style.display = 'none';
      sadBtn.style.display = 'block';
      entryText.value = '';
      showToast('saved 🌿');
    });

    entriesList.addEventListener('click', (e) => {
      const btn = e.target.closest('.btn-delete');
      if (!btn) return;
      const id = btn.dataset.id;
      if (confirm('remove this entry?')) {
        entries = entries.filter(e => e.id !== id);
        save();
        render();
        showToast('entry removed');
      }
    });

    // ── PWA Install ────────────────────────────────────────
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('installBanner').style.display = 'flex';
    });

    document.getElementById('installBtn').addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      deferredPrompt = null;
      document.getElementById('installBanner').style.display = 'none';
    });

    document.getElementById('closeBanner').addEventListener('click', () => {
      document.getElementById('installBanner').style.display = 'none';
    });

    // ── Service Worker ─────────────────────────────────────
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(console.error);
    }

    // ── Init ───────────────────────────────────────────────
    render();
  </script>
</body>
</html>
